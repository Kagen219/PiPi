<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日常畫畫 · Ahniomini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .work-card { border-radius: 20px; overflow: hidden; text-decoration: none; color: var(--text); border: 1.5px solid var(--border); background: #fff; transition: transform 0.22s, box-shadow 0.22s; display: block; }
    .work-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); }
    .card-thumb { aspect-ratio: 4/3; overflow: hidden; background: #f5f5f5; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
    .work-card:hover .card-thumb img { transform: scale(1.06); }
    .card-body { padding: 1.1rem 1.2rem 1.3rem; }
    .card-eyebrow { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.3rem; }
    .card-title { font-size: 1.05rem; font-weight: 900; margin-bottom: 0.3rem; }
    .card-count { font-size: 0.8rem; color: var(--text-muted); }
    .card-arrow { font-size: 0.85rem; color: #ccc; float: right; margin-top: -1.2rem; }
  </style>
</head>

</nav>

    <p class="eyebrow" style="color:#4A8B2A">Daily</p>
    <h1 class="page-title">日常畫畫</h1>
    <p class="page-desc">每天的塗鴉與練習，記錄創作的日常痕跡。</p>

</div>
