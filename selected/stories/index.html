  <style>
    .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .story-card {
      border-radius: 20px; overflow: hidden; cursor: pointer;
      text-decoration: none; color: var(--text);
      border: 1.5px solid var(--border); background: #fff;
      transition: transform 0.22s, box-shadow 0.22s; display: block;
    }
    .story-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); }
    .story-thumb { aspect-ratio: 4/3; overflow: hidden; }
    .story-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .story-card:hover .story-thumb img { transform: scale(1.06); }
    .story-body { padding: 1.1rem 1.2rem 1.3rem; }
    .story-title { font-size: 1.05rem; font-weight: 900; margin-bottom: 0.3rem; }
    .story-count { font-size: 0.8rem; color: var(--text-muted); }
    .story-arrow { font-size: 0.85rem; color: #ccc; float: right; margin-top: -1.2rem; }
  </style>
</head>
