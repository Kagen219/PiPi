<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陪伴的藝術 · Ahniomini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared.css">
  <style>
    body { background: #111; }
    .scroll-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .sh-back { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 700; text-decoration: none; transition: color 0.2s; }
    .sh-back:hover { color: #fff; }
    .sh-title { color: #fff; font-size: 0.9rem; font-weight: 900; }
    .sh-count { color: rgba(255,255,255,0.45); font-size: 0.78rem; font-weight: 700; }

    .scroll-wrap {
      padding-top: 52px;
      display: flex; flex-direction: column; align-items: center;
      background: #111;
    }
    .scroll-img {
      width: 100%; max-width: 720px;
      display: block;
      line-height: 0;
    }
    .scroll-img img {
      width: 100%; display: block;
      opacity: 0; transition: opacity 0.4s;
    }
    .scroll-img img.loaded { opacity: 1; }

    .scroll-end {
      padding: 3rem 1rem 5rem; text-align: center;
    }
    .end-text { color: rgba(255,255,255,0.35); font-size: 0.85rem; font-weight: 700; margin-bottom: 1.5rem; letter-spacing: 0.08em; }
    .end-btn {
      display: inline-block; background: #D4537E; color: #fff;
      font-size: 0.9rem; font-weight: 700; font-family: inherit;
      padding: 11px 26px; border-radius: 999px; text-decoration: none;
      transition: opacity 0.2s;
    }
    .end-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header class="scroll-header">
  <a class="sh-back" href="index.html">← 回小故事</a>
  <span class="sh-title">陪伴的藝術</span>
  <span class="sh-count" id="count-label"></span>
</header>

<div class="scroll-wrap" id="wrap"></div>

<script>
const ids = ["14OEF5NzbTORxLXiBtTdFC5OQBRUKo6pw","1A_WvU3_6CuPJY6ZFmraUUGINrbSQfjIM","1nVXJgRirdz10akfPtWCYDoURwR6ioT5c","1yd_TI4_oQxYVI3KzpX0-id8UwW_Cza36","1zE-EeYkr8zzjWqZ5tN_P6sV_Q5bvMJGg"];
const wrap = document.getElementById('wrap');
document.getElementById('count-label').textContent = ids.length + ' 張';

ids.forEach((id, i) => {
  const div = document.createElement('div');
  div.className = 'scroll-img';
  const img = document.createElement('img');
  img.src = 'https://lh3.googleusercontent.com/d/' + id;
  img.alt = '第 ' + (i + 1) + ' 張';
  img.loading = i < 2 ? 'eager' : 'lazy';
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => { div.style.display = 'none'; };
  div.appendChild(img);
  wrap.appendChild(div);
});

const endDiv = document.createElement('div');
endDiv.className = 'scroll-end';
endDiv.innerHTML = '<div class="end-text">— 故事結束 —</div><a class="end-btn" href="index.html">看其他故事</a>';
wrap.appendChild(endDiv);
</script>
</body>
</html>
