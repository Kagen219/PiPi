<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIPI圖文集 · Ahniomini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { background: #0d0d0d; }
    .ex-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ex-back { color: rgba(255,255,255,0.65); font-size: 0.85rem; font-weight: 700; text-decoration: none; transition: color 0.2s; }
    .ex-back:hover { color: #fff; }
    .ex-title { color: #fff; font-size: 0.9rem; font-weight: 900; }
    .ex-count { color: rgba(255,255,255,0.4); font-size: 0.78rem; font-weight: 700; }

    .ex-hero {
      padding: 120px 2rem 3rem; text-align: center;
      background: #0d0d0d;
    }
    .ex-eyebrow { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #7F77DD; margin-bottom: 0.75rem; }
    .ex-name { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; color: #fff; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 1rem; }
    .ex-desc { font-size: 1rem; color: rgba(255,255,255,0.45); max-width: 480px; margin: 0 auto; line-height: 1.8; }

    .ex-divider { width: 40px; height: 2px; background: #7F77DD; margin: 2rem auto; border-radius: 999px; }

    /* 展覽格 */
    .ex-grid {
      max-width: 1100px; margin: 0 auto;
      padding: 0 1.5rem 6rem;
      columns: 3; column-gap: 10px;
    }
    @media(max-width:768px) { .ex-grid { columns: 2; } }

    .ex-item {
      break-inside: avoid; margin-bottom: 10px;
      border-radius: 10px; overflow: hidden;
      cursor: pointer; position: relative;
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s;
    }
    .ex-item.visible { opacity: 1; transform: translateY(0); }
    .ex-item:hover { box-shadow: 0 0 0 2px #7F77DD; }
    .ex-item img { width: 100%; display: block; border-radius: 10px; transition: transform 0.4s; }
    .ex-item:hover img { transform: scale(1.03); }

    /* lightbox */
    .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:999; align-items:center; justify-content:center; padding:2rem; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw; max-height:90vh; border-radius:10px; object-fit:contain; }
    .lb-close { position:absolute; top:1.25rem; right:1.25rem; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:1.4rem; width:42px; height:42px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

<header class="ex-header">
  <a class="ex-back" href="../index.html#portfolio">← 返回</a>
  <span class="ex-title">PIPI圖文集</span>
  <span class="ex-count" id="count"></span>
</header>

<div class="ex-hero">
  <div class="ex-eyebrow">作品精選</div>
  <h1 class="ex-name">PIPI圖文集</h1>
  <p class="ex-desc">待填寫介紹文字</p>
  <div class="ex-divider"></div>
</div>

<div class="ex-grid" id="grid"></div>

<div class="lightbox" id="lb">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
const ids = ["10Q-uImYVnpJgPfW7wTq3dkmVVWLanANv","17To_bkLqtCYg9garM5WOWDt9uZ2f2cOM","18aFC4HJKpJM0sRCjPd4L3Nov2ClU7VQa","1G6KI1feIURpfaEzYFJro4MxtfvpB5dJM","1GH8g6hh22-_GzL3JnLHjBocyR-k-ldXv","1KpKaQgSvP-OTqPkce7VZwq1sYmC9k6VK","1PbWr22rYwX-oxqUXg9IIDFlzTPqRLFEx","1QLaJHwl8FDT_vJ_bXgoYImdrr4BEidgl","1TOan2O17buXq734XkYIJ3X5D49_QLFnO","1TQIgonOw-fhAScj_U6NnFqGPd9PW8TUs","1V0XQCfAFnap1CvtjYog3jDxmN8TSarL4","1XZJD1jlBKGT-RL-pITcC23tV1OJNnYmV","1dzJ6REpIKNodVH417gR83EykzhhY6v-s","1kgB6h-J3uy3Hwa090nXnCinEoqmsY92w","1l31rxTmLZhgvSmDblfZjUDD4bt9Yde4O","1tpLUE6eGoU6p8adI1kJtQIH3t3ISwHfb","1vEU5Nxo_EOh4PZ2wNGg-ne8UtwF5YUeI"];
document.getElementById('count').textContent = ids.length + ' 張';
const grid = document.getElementById('grid');
ids.forEach((id,i) => {
  const div = document.createElement('div');
  div.className = 'ex-item';
  const img = document.createElement('img');
  img.src = 'https://lh3.googleusercontent.com/d/' + id;
  img.loading = i < 4 ? 'eager' : 'lazy';
  img.onerror = () => { div.style.display='none'; };
  div.appendChild(img);
  div.onclick = () => openLb('https://lh3.googleusercontent.com/d/' + id);
  grid.appendChild(div);
});
const obs = new IntersectionObserver(entries => {
  entries.forEach((e,i) => { if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('visible'), i*60); obs.unobserve(e.target); } });
}, {threshold:0.08});
document.querySelectorAll('.ex-item').forEach(el => obs.observe(el));
function openLb(src){ document.getElementById('lb-img').src=src; document.getElementById('lb').classList.add('open'); }
function closeLb(){ document.getElementById('lb').classList.remove('open'); }
document.getElementById('lb').addEventListener('click',function(e){ if(e.target===this) closeLb(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLb(); });
</script>
</body>
</html>
